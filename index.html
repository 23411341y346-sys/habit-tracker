<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>習慣追蹤</title>
  <style>
    :root {
      --bg:     #f5f7fa;
      --card:   #ffffff;
      --text:   #202124;
      --sub:    #5f6368;
      --border: #e0e0e0;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #4f8ef7 0%, #34a853 100%);
      color: white;
      padding: 20px 20px 28px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

    .container { padding: 16px; max-width: 480px; margin: 0 auto; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--sub);
      margin-bottom: 14px;
    }

    /* ── Today check-in ── */
    .habit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .habit-row:last-child { border-bottom: none; }

    .habit-info { display: flex; align-items: center; gap: 10px; }

    .habit-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .habit-name  { font-weight: 600; font-size: 0.95rem; }
    .habit-desc  { font-size: 0.78rem; color: var(--sub); margin-top: 2px; }

    .btn-group {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .check-btn {
      border: none; cursor: pointer;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all .15s;
      white-space: nowrap;
    }
    .check-btn.done {
      background: #e8f5e9;
      color: #2e7d32;
      cursor: default;
    }
    .check-btn:not(.done):active { transform: scale(.95); }

    .cancel-btn {
      display: none;
      border: none; cursor: pointer;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 500;
      background: #fce8e6;
      color: #c62828;
      transition: all .15s;
      white-space: nowrap;
    }
    .cancel-btn:active  { transform: scale(.95); }
    .cancel-btn.visible { display: block; }

    .check-btn.sending  { opacity: .6; cursor: wait; }
    .cancel-btn.sending { opacity: .6; cursor: wait; }

    /* ── Week progress ── */
    .week-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .week-label {
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .week-label .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .week-days { display: flex; gap: 5px; }

    .day-bubble {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      background: #f0f0f0;
      color: var(--sub);
      flex-shrink: 0;
    }
    .day-bubble.today { box-shadow: 0 0 0 2px var(--text); }

    .week-stat { font-size: 0.78rem; color: var(--sub); margin-top: 8px; }
    .week-stat strong { color: var(--text); }

    .prog-bar-wrap {
      background: #f0f0f0;
      border-radius: 99px;
      height: 6px;
      margin-top: 8px;
      overflow: hidden;
    }
    .prog-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease;
    }

    /* ── Calendar ── */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-header h3 { font-size: 1rem; font-weight: 700; }
    .cal-nav {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 32px; height: 32px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }

    .cal-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 14px;
      font-size: 11px;
      color: var(--sub);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    /* ── Calendar cells（圓餅圖版） ── */
    .month-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: var(--bg);
      border-radius: 6px;
      padding: 3px;
    }
    .month-day.today  { outline: 1.5px solid var(--text); }
    .month-day.future { opacity: 0.35; }
    .cal-blank        { aspect-ratio: 1; }
    .day-num {
      font-size: 10px;
      color: var(--sub);
      line-height: 1;
    }

    /* ── Bottom spacing ── */
    .spacer { height: 24px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #323232;
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: transform .3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show  { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #c62828; }

    /* ── Loading overlay ── */
    .loading-mask {
      position: fixed;
      inset: 0;
      background: rgba(245,247,250,.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 900;
      transition: opacity .3s;
    }
    .loading-mask.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>習慣追蹤 📋</h1>
  <p id="header-date"></p>
</header>

<div class="container">

  <!-- Today -->
  <div class="card">
    <div class="card-title">今日打卡</div>
    <div id="today-rows"></div>
  </div>

  <!-- Week Progress -->
  <div class="card">
    <div class="card-title">本週進度</div>
    <div class="week-grid" id="week-grid"></div>
  </div>

  <!-- Calendar -->
  <div class="card">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
      <h3 id="cal-title"></h3>
      <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="cal-legend" id="cal-legend"></div>
    <div class="cal-weekdays">
      <div>日</div><div>一</div><div>二</div><div>三</div>
      <div>四</div><div>五</div><div>六</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="spacer"></div>
</div>

<div class="loading-mask" id="loading-mask">
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzurNTfr1RGXjK40hMgZEGGKqKtjZVFTBe7b33YYWovOAZy105Uu477uClRdP0g96kS/exec';

const HABITS = [
  {
    key:   'reading',
    api:   'english-reading',
    icon:  '📖',
    name:  '英文-閱讀',
    desc:  '每天 20 分鐘',
    goal:  7,
    color: '#85B7EB',
    colorLight: '#E6F1FB',
  },
  {
    key:   'listening',
    api:   'english-listening',
    icon:  '🎧',
    name:  '英文-聽力',
    desc:  '每天 20 分鐘',
    goal:  7,
    color: '#5DCAA5',
    colorLight: '#E1F5EE',
  },
  {
    key:   'writing',
    api:   'english-writing',
    icon:  '✍️',
    name:  '英文-寫作',
    desc:  '每天 20 分鐘',
    goal:  7,
    color: '#ED93B1',
    colorLight: '#FBEAF0',
  },
  {
    key:   'exe',
    api:   'exercise',
    icon:  '🏃',
    name:  '運動',
    desc:  '每週 4 天',
    goal:  4,
    color: '#EF9F27',
    colorLight: '#FAEEDA',
  },
];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const today = new Date();
today.setHours(0, 0, 0, 0);

// key → Set<dateString>
const habitData = Object.fromEntries(HABITS.map(h => [h.key, new Set()]));

let calYear  = today.getFullYear();
let calMonth = today.getMonth();

// 防止重複送出
const sending = Object.fromEntries(HABITS.map(h => [h.key, false]));

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function dateKey(d) {
  const y  = d.getFullYear();
  const m  = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function habitByKey(key) {
  return HABITS.find(h => h.key === key);
}

// ═══════════════════════════════════════════════
//  STATIC HTML BUILDERS（一次性）
// ═══════════════════════════════════════════════
function buildStaticHTML() {
  // Today rows
  const rowsEl = document.getElementById('today-rows');
  rowsEl.innerHTML = HABITS.map(h => `
    <div class="habit-row" id="row-${h.key}">
      <div class="habit-info">
        <div class="habit-icon"
             style="background:${h.colorLight}">${h.icon}</div>
        <div>
          <div class="habit-name">${h.name}</div>
          <div class="habit-desc">${h.desc}</div>
        </div>
      </div>
      <div class="btn-group">
        <button class="check-btn"
                id="btn-${h.key}"
                style="background:${h.colorLight};color:${h.color}"
                onclick="checkIn('${h.key}')">打卡</button>
        <button class="cancel-btn"
                id="cancel-${h.key}"
                onclick="cancelCheckIn('${h.key}')">取消今日打卡</button>
      </div>
    </div>
  `).join('');

  // Week grid rows
  const weekEl = document.getElementById('week-grid');
  weekEl.innerHTML = HABITS.map(h => `
    <div class="week-habit">
      <div class="week-label">
        <span class="dot" style="background:${h.color}"></span>${h.name}
      </div>
      <div class="week-days" id="week-${h.key}"></div>
      <div class="week-stat" id="stat-${h.key}"></div>
      <div class="prog-bar-wrap">
        <div class="prog-bar-fill" id="bar-${h.key}"
             style="background:${h.color};width:0%"></div>
      </div>
    </div>
  `).join('');

  // Calendar legend — 對應圓餅圖四個扇形
  const legendEl = document.getElementById('cal-legend');
  legendEl.innerHTML = HABITS.map(h => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${h.color}"></span>${h.name}
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
//  API — GET
// ═══════════════════════════════════════════════
async function loadData() {
  setLoading(true);
  try {
    const res = await fetch(API_URL, { redirect: 'follow' });
    console.log('[loadData] response.status:', res.status);
    console.log('[loadData] response.url:', res.url);

    const rawText = await res.text();
    console.log('[loadData] response.text() 原始內容:', rawText);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    let records;
    try {
      records = JSON.parse(rawText);
    } catch (parseErr) {
      throw new Error('JSON 解析失敗: ' + parseErr.message);
    }

    const todayKey = dateKey(today);
    console.log('[loadData] 今天日期:', todayKey);
    console.log('[loadData] 原始資料 (parsed):', JSON.stringify(records, null, 2));

    const todayRecords = records.filter(r => r.date === todayKey);
    console.log('[loadData] 今日紀錄:', JSON.stringify(todayRecords, null, 2));

    // 以 "date|api_habit" 為 key，後出現的覆蓋前面（取最新狀態）
    const stateMap = new Map();
    for (const r of records) {
      stateMap.set(`${r.date}|${r.habit}`, r.done === true || r.done === 'TRUE');
    }

    // 清空再填入
    HABITS.forEach(h => habitData[h.key].clear());
    for (const [mapKey, done] of stateMap) {
      if (!done) continue;
      const [date, apiHabit] = mapKey.split('|');
      const h = HABITS.find(x => x.api === apiHabit);
      if (h) habitData[h.key].add(date);
    }

    HABITS.forEach(h => {
      console.log(`[loadData] ${h.name} 已打卡日期:`, [...habitData[h.key]]);
    });

    renderAll();
  } catch (err) {
    console.error('載入資料失敗', err);
    showToast('⚠️ 載入資料失敗，請重新整理', true);
    renderAll();
  } finally {
    setLoading(false);
  }
}

// ═══════════════════════════════════════════════
//  API — POST 打卡
// ═══════════════════════════════════════════════
async function checkIn(key) {
  const h = habitByKey(key);
  const todayKey = dateKey(today);
  if (habitData[key].has(todayKey)) return;
  if (sending[key]) return;

  sending[key] = true;
  const btn = document.getElementById('btn-' + key);
  btn.textContent = '傳送中…';
  btn.classList.add('sending');
  habitData[key].add(todayKey); // 樂觀更新

  try {
    const res = await fetch(API_URL, {
      method:   'POST',
      redirect: 'follow',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({ date: todayKey, habit: h.api, done: true }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    showToast(`${h.icon} ${h.name} 打卡成功！`);
  } catch (err) {
    console.error('打卡失敗', err);
    habitData[key].delete(todayKey);
    showToast('⚠️ 打卡失敗，請再試一次', true);
  } finally {
    sending[key] = false;
    renderAll();
  }
}

// ═══════════════════════════════════════════════
//  API — POST 取消打卡
// ═══════════════════════════════════════════════
async function cancelCheckIn(key) {
  const h = habitByKey(key);
  const todayKey = dateKey(today);
  if (!habitData[key].has(todayKey)) return;
  if (sending[key]) return;

  sending[key] = true;
  const cancelBtn = document.getElementById('cancel-' + key);
  cancelBtn.textContent = '取消中…';
  cancelBtn.classList.add('sending');
  habitData[key].delete(todayKey); // 樂觀更新

  try {
    const res = await fetch(API_URL, {
      method:   'POST',
      redirect: 'follow',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({ date: todayKey, habit: h.api, done: false }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    showToast(`${h.icon} ${h.name} 打卡已取消`);
  } catch (err) {
    console.error('取消失敗', err);
    habitData[key].add(todayKey);
    showToast('⚠️ 取消失敗，請再試一次', true);
  } finally {
    sending[key] = false;
    cancelBtn.textContent = '取消今日打卡';
    cancelBtn.classList.remove('sending');
    renderAll();
  }
}

// ═══════════════════════════════════════════════
//  LOADING
// ═══════════════════════════════════════════════
function setLoading(on) {
  document.getElementById('loading-mask').classList.toggle('hidden', !on);
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  renderHeader();
  renderTodayButtons();
  renderWeek();
  renderCalendar();
}

function renderHeader() {
  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('header-date').textContent =
    today.toLocaleDateString('zh-TW', opts);
}

function renderTodayButtons() {
  const todayKey = dateKey(today);
  HABITS.forEach(h => {
    const btn    = document.getElementById('btn-' + h.key);
    const cancel = document.getElementById('cancel-' + h.key);
    if (habitData[h.key].has(todayKey)) {
      btn.textContent = '✓ 完成';
      btn.className   = 'check-btn done';
      cancel.classList.add('visible');
    } else {
      btn.textContent = '打卡';
      btn.className   = 'check-btn';
      btn.style.background = h.colorLight;
      btn.style.color      = h.color;
      cancel.classList.remove('visible');
    }
  });
}

function renderWeek() {
  const DAY_NAMES = ['日','一','二','三','四','五','六'];
  const dow    = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));

  HABITS.forEach(h => {
    const wrap = document.getElementById('week-' + h.key);
    wrap.innerHTML = '';
    let count = 0;

    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const key    = dateKey(d);
      const done   = habitData[h.key].has(key);
      const isToday = key === dateKey(today);
      const future  = d > today;
      if (done && !future) count++;

      const el = document.createElement('div');
      el.className = 'day-bubble' + (isToday ? ' today' : '');
      el.textContent = DAY_NAMES[d.getDay()];

      if (done && !future) {
        el.style.background = h.color;
        el.style.color = 'white';
      }
      if (future) el.style.opacity = '0.3';
      wrap.appendChild(el);
    }

    const pct = Math.min(100, Math.round(count / h.goal * 100));
    document.getElementById('stat-' + h.key).innerHTML =
      `<strong>${count}</strong> / ${h.goal} 天`;
    document.getElementById('bar-' + h.key).style.width = pct + '%';
  });
}

// ═══════════════════════════════════════════════
//  PIE CHART HELPERS
// ═══════════════════════════════════════════════

// 回傳當日四個習慣的完成狀態陣列（順序與 HABITS 一致）
function getDayStates(dateStr) {
  return HABITS.map(h => habitData[h.key].has(dateStr));
}

// 繪製 22×22 四等份圓餅 SVG
// states = [reading, listening, writing, exe]，每個值是 boolean
function renderPieSvg(states) {
  const cx = 11, cy = 11, r = 9;
  // 從頂端順時針：上(reading)→右(listening)→下(writing)→左(exe)
  const degAngles = [-90, 0, 90, 180, 270];
  const rad = degAngles.map(a => a * Math.PI / 180);

  let paths = '';
  for (let i = 0; i < 4; i++) {
    const x1 = +(cx + r * Math.cos(rad[i])).toFixed(2);
    const y1 = +(cy + r * Math.sin(rad[i])).toFixed(2);
    const x2 = +(cx + r * Math.cos(rad[i + 1])).toFixed(2);
    const y2 = +(cy + r * Math.sin(rad[i + 1])).toFixed(2);
    const fill = states[i] ? HABITS[i].color : HABITS[i].colorLight;
    // large-arc=0（四分之一弧），sweep=1（順時針）
    paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z" fill="${fill}"/>`;
  }

  return `<svg width="22" height="22" viewBox="0 0 22 22" style="display:block;flex-shrink:0">${paths}</svg>`;
}

function renderCalendar() {
  document.getElementById('cal-title').textContent =
    `${calYear} 年 ${calMonth + 1} 月`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const first    = new Date(calYear, calMonth, 1).getDay();
  const days     = new Date(calYear, calMonth + 1, 0).getDate();
  const todayKey = dateKey(today);

  // 空白補位
  for (let i = 0; i < first; i++) {
    const blank = document.createElement('div');
    blank.className = 'cal-blank';
    grid.appendChild(blank);
  }

  for (let d = 1; d <= days; d++) {
    const dt       = new Date(calYear, calMonth, d);
    const key      = dateKey(dt);
    const isToday  = key === todayKey;
    const isFuture = dt > today;
    const states   = getDayStates(key);

    const cell = document.createElement('div');
    cell.className = 'month-day' +
      (isToday  ? ' today'  : '') +
      (isFuture ? ' future' : '');

    cell.innerHTML =
      `<span class="day-num">${d}</span>` +
      renderPieSvg(states);

    grid.appendChild(cell);
  }
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCalendar();
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', isError);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildStaticHTML();
renderHeader();
loadData();
</script>
</body>
