<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>習慣追蹤</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    :root {
      --bg:       #f5f7fa;
      --card:     #ffffff;
      --text:     #202124;
      --sub:      #5f6368;
      --border:   #e0e0e0;
      --sq-empty: #ebebeb;
      --radius:   16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #4f8ef7 0%, #34a853 100%);
      color: white;
      padding: 20px 20px 28px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

    .container { padding: 16px; max-width: 480px; margin: 0 auto; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--sub);
      margin-bottom: 14px;
    }

    /* ── Today check-in ── */
    .habit-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .habit-row:last-child { border-bottom: none; }

    .habit-icon-wrap {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .habit-info { flex: 1; min-width: 0; }
    .habit-name   { font-size: 0.88rem; font-weight: 600; line-height: 1.2; }
    .habit-target { font-size: 0.7rem; color: var(--sub); margin-top: 2px; }

    .backfill-btn {
      flex: 0 0 auto;
      padding: 5px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--sub);
      font-size: 0.7rem;
      cursor: pointer;
      line-height: 1.3;
      white-space: nowrap;
      transition: all .15s;
    }
    .backfill-btn.backfilled {
      background: var(--bg);
      border-color: #bbb;
      color: var(--text);
      font-weight: 600;
    }
    .backfill-btn.disabled {
      background: var(--bg);
      border-color: var(--border);
      color: var(--sub);
      cursor: not-allowed;
      opacity: 0.6;
    }
    .backfill-btn.sending { opacity: .5; cursor: wait; }

    .checkin-btn {
      flex: 0 0 auto;
      padding: 7px 13px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--sub);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    .checkin-btn:active:not(.sending) { transform: scale(.95); }
    .checkin-btn.sending { opacity: .6; cursor: wait; }

    /* ── Group pager (shared) ── */
    .group-pager-wrap {
      overflow: hidden;
      touch-action: pan-y;
      user-select: none;
      cursor: grab;
    }
    .group-pager-wrap.dragging { cursor: grabbing; }
    .group-pager {
      display: flex;
      transition: transform 0.3s ease;
      will-change: transform;
    }
    .group-page { min-width: 100%; }

    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .group-name  { font-weight: 700; font-size: 0.9rem; }
    .swipe-hint  { font-size: 0.72rem; color: var(--sub); }

    /* ── Dot indicators ── */
    .dot-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.2s;
    }
    .dot.active { background: var(--text); width: 18px; border-radius: 3px; }

    /* ── Week Progress ── */
    .habit-card {
      background: var(--bg);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .habit-card:last-child { margin-bottom: 0; }

    .habit-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .habit-card-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.88rem;
    }
    .habit-card-title i { font-size: 1rem; }
    .week-stat { font-size: 0.76rem; color: var(--sub); font-weight: 500; }

    .week-squares {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .week-sq {
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sq-label {
      font-size: 0.62rem;
      font-weight: 700;
      line-height: 1;
    }

    /* ── Calendar header row ── */
    .cal-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-month-nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .cal-month-nav span {
      font-size: 0.88rem;
      font-weight: 700;
      min-width: 76px;
      text-align: center;
    }
    .cal-nav {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      width: 26px; height: 26px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
    }

    /* ── Calendar legend ── */
    .cal-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-bottom: 10px;
      font-size: 11px;
      color: var(--sub);
    }
    .legend-item  { display: flex; align-items: center; gap: 4px; }
    .legend-dot   { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-count { font-weight: 600; color: var(--text); margin-left: 2px; }

    /* ── Calendar grid ── */
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 4px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .month-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border-radius: 6px;
      background: var(--bg);
      padding: 2px;
    }
    .month-day.today  { outline: 1.5px solid var(--text); outline-offset: 1px; }
    .month-day.future { opacity: 0.35; }
    .cal-blank        { aspect-ratio: 1; }
    .day-num          { font-size: 9px; color: var(--sub); line-height: 1; }

    /* ── Toast ── */
    .spacer { height: 24px; }
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #323232;
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.88rem;
      font-weight: 500;
      transition: transform .3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show  { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #c62828; }

    /* ── Loading ── */
    .loading-mask {
      position: fixed; inset: 0;
      background: rgba(245,247,250,.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 900;
      transition: opacity .3s;
    }
    .loading-mask.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: #85B7EB;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Today group section labels ── */
    .group-section-label {
      font-size: 11px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0 0 6px 4px;
      margin-top: 20px;
      border-bottom: 1px solid #eee;
    }
    .group-section-label:first-of-type { margin-top: 0; }
  </style>
</head>
<body>

<header>
  <h1>習慣追蹤 📋</h1>
  <p id="header-date"></p>
</header>

<div class="container">

  <!-- TODAY CHECK-IN -->
  <div class="card">
    <div class="card-title">今日打卡</div>
    <div id="today-rows"></div>
  </div>

  <!-- WEEK PROGRESS -->
  <div class="card">
    <div class="card-title">本週進度</div>
    <div class="group-pager-wrap" id="week-wrap">
      <div class="group-pager" id="week-pager"></div>
    </div>
    <div class="dot-row" id="week-dots"></div>
  </div>

  <!-- CALENDAR -->
  <div class="card">
    <div class="cal-header-row">
      <span class="card-title" style="margin:0">本月月曆</span>
      <div class="cal-month-nav">
        <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
        <span id="cal-title"></span>
        <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
      </div>
    </div>
    <div class="group-pager-wrap" id="cal-wrap">
      <div class="group-pager" id="cal-pager"></div>
    </div>
    <div class="dot-row" id="cal-dots"></div>
  </div>

  <div class="spacer"></div>
</div>

<div class="loading-mask" id="loading-mask">
  <div class="spinner"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzurNTfr1RGXjK40hMgZEGGKqKtjZVFTBe7b33YYWovOAZy105Uu477uClRdP0g96kS/exec';

const HABIT_CONFIG = {
  'english-reading':   { name: '英文-閱讀', icon: 'ti-book',       done: '#85B7EB', empty: '#E6F1FB', textColor: '#0C447C', target: '每天 20 分鐘',    goal: 7 },
  'english-listening': { name: '英文-聽力', icon: 'ti-headphones', done: '#5DCAA5', empty: '#E1F5EE', textColor: '#085041', target: '每天 20 分鐘',    goal: 7 },
  'english-writing':   { name: '英文-寫作', icon: 'ti-pencil',     done: '#ED93B1', empty: '#FBEAF0', textColor: '#72243E', target: '每天 20 分鐘',    goal: 7 },
  'healthy-diet':      { name: '健康飲食',  icon: 'ti-apple',      done: '#97C459', empty: '#EAF3DE', textColor: '#27500A', target: '每天',           goal: 7 },
  'exercise':          { name: '運動',      icon: 'ti-run',        done: '#EF9F27', empty: '#FAEEDA', textColor: '#633806', target: '每週 4 天',      goal: 4 },
  'dental-floss':      { name: '用牙線',   icon: 'ti-tooth',      done: '#5BB8D4', empty: '#E0F4F9', textColor: '#0D4A5E', target: '每天',           goal: 7 },
  'skincare':          { name: '臉部保養', icon: 'ti-sparkles',   done: '#D97BBF', empty: '#FDE8F5', textColor: '#6B1256', target: '每天',           goal: 7 },
  'water-intake':      { name: '喝水2000cc', icon: 'ti-droplet',  done: '#4FC3E8', empty: '#DFF4FB', textColor: '#0A4A63', target: '每天',           goal: 7 },
  'blue-light':        { name: '睡前藍光',  icon: 'ti-moon',     done: '#B39DDB', empty: '#EDE7F6', textColor: '#311B92', target: '每天',           goal: 7 },
  'reading':           { name: '閱讀',      icon: 'ti-book-2',     done: '#B594E2', empty: '#F0E8FB', textColor: '#3D1F73', target: '每天 15 分鐘',    goal: 7 },
  'web-dev':           { name: '網站建設',  icon: 'ti-code',       done: '#E89567', empty: '#FCEBE0', textColor: '#6B2B0C', target: '每週累積 30 分鐘', goal: 4 },
  'wealth-mindset':    { name: '財富思維',  icon: 'ti-coin',       done: '#FFD54F', empty: '#FFF8E1', textColor: '#6B4C00', target: '每天 15 分鐘',    goal: 7 },
  'maritime-law':      { name: '海法大神',  icon: 'ti-gavel',      done: '#78909C', empty: '#ECEFF1', textColor: '#1C313A', target: '每天',           goal: 7 },
};

const GROUPS = {
  english:  { name: '母語溝通者', habits: ['english-reading', 'english-listening', 'english-writing'] },
  health:   { name: '塑造者',     habits: ['healthy-diet', 'exercise', 'dental-floss', 'skincare', 'water-intake', 'blue-light'] },
  learning: { name: '佈局者',     habits: ['reading', 'web-dev', 'wealth-mindset', 'maritime-law'] },
};

const HABIT_KEYS = Object.keys(HABIT_CONFIG);
const GROUP_KEYS = Object.keys(GROUPS);

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const today = new Date();
today.setHours(0, 0, 0, 0);

const habitData       = Object.fromEntries(HABIT_KEYS.map(k => [k, new Set()]));
const backfilledDates = Object.fromEntries(HABIT_KEYS.map(k => [k, new Set()]));
const sending         = Object.fromEntries(HABIT_KEYS.map(k => [k, false]));
const sendingBackfill = Object.fromEntries(HABIT_KEYS.map(k => [k, false]));

let calYear  = today.getFullYear();
let calMonth = today.getMonth();

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function dateKey(d) {
  const y  = d.getFullYear();
  const m  = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

// ═══════════════════════════════════════════════
//  BUILD STATIC HTML（一次性）
// ═══════════════════════════════════════════════
function buildStaticHTML() {

  // ── Today rows（依群組分區）──
  document.getElementById('today-rows').innerHTML = GROUP_KEYS.map(gKey => {
    const group = GROUPS[gKey];
    const rows  = group.habits.map(key => {
      const c = HABIT_CONFIG[key];
      return `
        <div class="habit-row">
          <div class="habit-icon-wrap" style="background:${c.empty};color:${c.textColor}">
            <i class="ti ${c.icon}" aria-hidden="true"></i>
          </div>
          <div class="habit-info">
            <div class="habit-name">${c.name}</div>
            <div class="habit-target">${c.target}</div>
          </div>
          <button class="backfill-btn" id="backfill-btn-${key}"
                  onclick="toggleBackfill('${key}')">前一天補打</button>
          <button class="checkin-btn" id="checkin-btn-${key}"
                  onclick="toggleCheckIn('${key}')">打卡</button>
        </div>`;
    }).join('');
    return `<div class="group-section-label">${group.name}</div>${rows}`;
  }).join('');

  // ── Week pager pages ──
  document.getElementById('week-pager').innerHTML = GROUP_KEYS.map((gKey, gi) => {
    const group = GROUPS[gKey];
    const isLast = gi === GROUP_KEYS.length - 1;
    const hint   = isLast ? '← 向右滑' : '向左滑 →';
    return `
      <div class="group-page">
        <div class="group-header">
          <span class="group-name">${group.name}</span>
          <span class="swipe-hint">${hint}</span>
        </div>
        ${group.habits.map(key => {
          const c = HABIT_CONFIG[key];
          return `
            <div class="habit-card">
              <div class="habit-card-header">
                <div class="habit-card-title">
                  <i class="ti ${c.icon}" style="color:${c.done}"></i>
                  <span>${c.name}</span>
                </div>
                <div class="week-stat" id="wstat-${key}">本週 0/${c.goal}</div>
              </div>
              <div class="week-squares" id="wsq-${key}"></div>
            </div>`;
        }).join('')}
      </div>`;
  }).join('');

  // ── Calendar pager pages ──
  document.getElementById('cal-pager').innerHTML = GROUP_KEYS.map((gKey, gi) => {
    const group  = GROUPS[gKey];
    const isLast = gi === GROUP_KEYS.length - 1;
    const hint   = isLast ? '← 向右滑' : '向左滑 →';
    const legend = group.habits.map(key => {
      const c = HABIT_CONFIG[key];
      return `<div class="legend-item">
        <span class="legend-dot" style="background:${c.done}"></span>
        ${c.name}<span class="legend-count" id="lcount-${key}">–</span>
      </div>`;
    }).join('');
    return `
      <div class="group-page">
        <div class="group-header">
          <span class="group-name">${group.name}</span>
          <span class="swipe-hint">${hint}</span>
        </div>
        <div class="cal-legend">${legend}</div>
        <div class="cal-weekdays">
          <div>日</div><div>一</div><div>二</div><div>三</div>
          <div>四</div><div>五</div><div>六</div>
        </div>
        <div class="cal-grid" id="cal-grid-${gKey}"></div>
      </div>`;
  }).join('');

  // ── Dot indicators ──
  const dotHTML = GROUP_KEYS.map((_, i) =>
    `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');
  document.getElementById('week-dots').innerHTML = dotHTML;
  document.getElementById('cal-dots').innerHTML  = dotHTML;

  // ── Swipe setup ──
  setupSwipe(
    document.getElementById('week-wrap'),
    document.getElementById('week-pager'),
    [...document.querySelectorAll('#week-dots .dot')]
  );
  setupSwipe(
    document.getElementById('cal-wrap'),
    document.getElementById('cal-pager'),
    [...document.querySelectorAll('#cal-dots .dot')]
  );
}

// ═══════════════════════════════════════════════
//  SWIPE（touch + mouse）
// ═══════════════════════════════════════════════
function setupSwipe(wrapEl, pagerEl, dots) {
  let page   = 0;
  let startX = 0, curX = 0, active = false;
  const total = dots.length;

  function goTo(p) {
    page = Math.max(0, Math.min(total - 1, p));
    pagerEl.style.transform = `translateX(-${page * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === page));
  }

  function onStart(x) { startX = x; curX = x; active = true; wrapEl.classList.add('dragging'); }
  function onMove(x)  { if (active) curX = x; }
  function onEnd()    {
    if (!active) return;
    if (Math.abs(curX - startX) > 50) goTo(curX < startX ? page + 1 : page - 1);
    active = false;
    wrapEl.classList.remove('dragging');
  }

  // Touch
  wrapEl.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
  wrapEl.addEventListener('touchmove',  e => onMove(e.touches[0].clientX),  { passive: true });
  wrapEl.addEventListener('touchend',   onEnd);

  // Mouse
  wrapEl.addEventListener('mousedown', e => { onStart(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove', e => onMove(e.clientX));
  window.addEventListener('mouseup',   onEnd);
}

// ═══════════════════════════════════════════════
//  API — GET 讀取歷史資料
// ═══════════════════════════════════════════════
async function loadData() {
  setLoading(true);
  try {
    const res = await fetch(API_URL, { redirect: 'follow' });
    console.log('[loadData] status:', res.status, '| url:', res.url);

    const rawText = await res.text();
    console.log('[loadData] raw response:', rawText);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    let records;
    try   { records = JSON.parse(rawText); }
    catch (e) { throw new Error('JSON 解析失敗: ' + e.message); }

    const todayKey = dateKey(today);
    console.log('[loadData] today:', todayKey);
    console.log('[loadData] all records:', JSON.stringify(records, null, 2));
    console.log('[loadData] today records:',
      JSON.stringify(records.filter(r => r.date === todayKey), null, 2));

    // 後出現的紀錄覆蓋前面（取最新狀態）
    const stateMap = new Map();
    for (const r of records) {
      const done       = r.done       === true || r.done       === 'TRUE';
      const backfilled = r.backfilled === true || r.backfilled === 'TRUE';
      stateMap.set(`${r.date}|${r.habit}`, { done, backfilled });
    }

    HABIT_KEYS.forEach(k => { habitData[k].clear(); backfilledDates[k].clear(); });
    for (const [mapKey, { done, backfilled }] of stateMap) {
      if (!done) continue;
      const idx   = mapKey.indexOf('|');
      const date  = mapKey.slice(0, idx);
      const habit = mapKey.slice(idx + 1);
      if (habitData[habit] !== undefined) {
        habitData[habit].add(date);
        if (backfilled) backfilledDates[habit].add(date);
      }
    }

    HABIT_KEYS.forEach(k =>
      console.log(`[loadData] ${HABIT_CONFIG[k].name}:`, [...habitData[k]]));

    renderAll();
  } catch (err) {
    console.error('[loadData] 失敗:', err);
    showToast('⚠️ 載入資料失敗，請重新整理', true);
    renderAll();
  } finally {
    setLoading(false);
  }
}

// ═══════════════════════════════════════════════
//  YESTERDAY KEY
// ═══════════════════════════════════════════════
function yesterdayKey() {
  const y = new Date(today);
  y.setDate(y.getDate() - 1);
  return dateKey(y);
}

// ═══════════════════════════════════════════════
//  BACKFILL STATE
// ═══════════════════════════════════════════════
function getBackfillState(key) {
  const yKey = yesterdayKey();
  if (!habitData[key].has(yKey))      return 'can-backfill';
  if (backfilledDates[key].has(yKey)) return 'backfilled';
  return 'already-done';
}

// ═══════════════════════════════════════════════
//  API — POST 補打切換
// ═══════════════════════════════════════════════
async function toggleBackfill(key) {
  const yKey  = yesterdayKey();
  const state = getBackfillState(key);
  if (state === 'already-done' || sendingBackfill[key]) return;

  sendingBackfill[key] = true;
  const btn = document.getElementById('backfill-btn-' + key);
  if (btn) btn.classList.add('sending');

  const newDone = state === 'can-backfill';

  // 樂觀更新
  if (newDone) {
    habitData[key].add(yKey);
    backfilledDates[key].add(yKey);
  } else {
    habitData[key].delete(yKey);
    backfilledDates[key].delete(yKey);
  }
  renderAll();

  try {
    const res = await fetch(API_URL, {
      method:   'POST',
      redirect: 'follow',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({ date: yKey, habit: key, done: newDone, backfilled: newDone }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const c = HABIT_CONFIG[key];
    showToast(newDone ? `✓ ${c.name} 補打成功！` : `${c.name} 補打已取消`);
  } catch (err) {
    console.error('補打失敗', err);
    // 回滾
    if (newDone) {
      habitData[key].delete(yKey);
      backfilledDates[key].delete(yKey);
    } else {
      habitData[key].add(yKey);
      backfilledDates[key].add(yKey);
    }
    showToast('⚠️ 操作失敗，請再試一次', true);
  } finally {
    sendingBackfill[key] = false;
    if (btn) btn.classList.remove('sending');
    renderAll();
  }
}

// ═══════════════════════════════════════════════
//  API — POST 打卡切換
// ═══════════════════════════════════════════════
async function toggleCheckIn(key) {
  const todayKey = dateKey(today);
  if (sending[key]) return;

  const wasDone = habitData[key].has(todayKey);
  sending[key] = true;

  // 樂觀更新
  if (wasDone) habitData[key].delete(todayKey);
  else         habitData[key].add(todayKey);

  const btn = document.getElementById('checkin-btn-' + key);
  btn.classList.add('sending');
  renderTodayButtons();

  try {
    const res = await fetch(API_URL, {
      method:   'POST',
      redirect: 'follow',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({ date: todayKey, habit: key, done: !wasDone, backfilled: false }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const c = HABIT_CONFIG[key];
    showToast(wasDone ? `${c.name} 打卡已取消` : `✓ ${c.name} 打卡成功！`);
  } catch (err) {
    console.error('打卡失敗', err);
    // 回滾
    if (wasDone) habitData[key].add(todayKey);
    else         habitData[key].delete(todayKey);
    showToast('⚠️ 操作失敗，請再試一次', true);
  } finally {
    sending[key] = false;
    btn.classList.remove('sending');
    renderAll();
  }
}

// ═══════════════════════════════════════════════
//  LOADING / TOAST
// ═══════════════════════════════════════════════
function setLoading(on) {
  document.getElementById('loading-mask').classList.toggle('hidden', !on);
}

let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', isError);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  renderHeader();
  renderTodayButtons();
  renderWeek();
  renderCalendar();
}

function renderHeader() {
  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('header-date').textContent =
    today.toLocaleDateString('zh-TW', opts);
}

function renderTodayButtons() {
  const todayKey = dateKey(today);
  HABIT_KEYS.forEach(key => {
    const c = HABIT_CONFIG[key];

    // ── 打卡按鈕 ──
    const checkinBtn = document.getElementById('checkin-btn-' + key);
    if (checkinBtn) {
      const done = habitData[key].has(todayKey);
      if (done) {
        checkinBtn.textContent = '✓ 完成';
        checkinBtn.style.cssText =
          `background:${c.empty};border-color:${c.done};color:${c.textColor}`;
      } else {
        checkinBtn.textContent = '打卡';
        checkinBtn.style.cssText =
          'background:var(--bg);border-color:var(--border);color:var(--sub)';
      }
    }

    // ── 補打按鈕 ──
    const backfillBtn = document.getElementById('backfill-btn-' + key);
    if (!backfillBtn) return;
    const bfState = getBackfillState(key);
    backfillBtn.className = 'backfill-btn';
    if (bfState === 'backfilled') {
      backfillBtn.textContent = '✓ 已補打';
      backfillBtn.classList.add('backfilled');
      backfillBtn.disabled = false;
    } else if (bfState === 'already-done') {
      backfillBtn.textContent = '前一天已打';
      backfillBtn.classList.add('disabled');
      backfillBtn.disabled = true;
    } else {
      backfillBtn.textContent = '前一天補打';
      backfillBtn.disabled = false;
    }
  });
}

function renderWeek() {
  const LABELS  = ['一','二','三','四','五','六','日'];
  const dow     = today.getDay();
  const monday  = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const todayKey = dateKey(today);

  HABIT_KEYS.forEach(key => {
    const c      = HABIT_CONFIG[key];
    const sqEl   = document.getElementById('wsq-'   + key);
    const statEl = document.getElementById('wstat-' + key);
    if (!sqEl) return;

    let count = 0, html = '';

    for (let i = 0; i < 7; i++) {
      const d       = new Date(monday);
      d.setDate(monday.getDate() + i);
      const dKey    = dateKey(d);
      const done    = habitData[key].has(dKey);
      const isToday = dKey === todayKey;
      const future  = d > today;
      if (done && !future) count++;

      const bg         = done && !future ? c.done : 'var(--sq-empty)';
      const opacity    = future ? 'opacity:.38;' : '';
      const outline    = isToday
        ? `outline:2px solid ${done ? c.textColor : '#aaa'};outline-offset:1px;`
        : '';
      const labelColor = done && !future ? c.textColor : 'var(--sub)';

      html += `<div class="week-sq" style="background:${bg};${opacity}${outline}">
        <span class="sq-label" style="color:${labelColor}">${LABELS[i]}</span>
      </div>`;
    }

    sqEl.innerHTML   = html;
    statEl.textContent = `本週 ${count}/${c.goal}`;
  });
}

// ═══════════════════════════════════════════════
//  PIE SVG
// ═══════════════════════════════════════════════
function pieSvg(states, colorPairs, size = 22) {
  const cx = size / 2, cy = size / 2, r = size / 2 - 2;
  const n   = states.length;
  const deg = 360 / n;
  let paths = '';
  for (let i = 0; i < n; i++) {
    const a1 = (-90 + i * deg)       * Math.PI / 180;
    const a2 = (-90 + (i + 1) * deg) * Math.PI / 180;
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    const la = deg > 180 ? 1 : 0;
    const fill = states[i] ? colorPairs[i].done : colorPairs[i].empty;
    paths += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${la},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${fill}"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;flex-shrink:0">${paths}</svg>`;
}

// ═══════════════════════════════════════════════
//  CALENDAR HELPERS
// ═══════════════════════════════════════════════

// 計算某習慣在「當月」（今天所在的月份）的完成天數
function getMonthCount(habitKey) {
  const yyyymm = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
  let count = 0;
  for (const d of habitData[habitKey]) {
    if (d.startsWith(yyyymm)) count++;
  }
  return count;
}

// ═══════════════════════════════════════════════
//  CALENDAR RENDER
// ═══════════════════════════════════════════════
function renderCalendar() {
  document.getElementById('cal-title').textContent =
    `${calYear} 年 ${calMonth + 1} 月`;

  GROUP_KEYS.forEach(gKey => {
    const group  = GROUPS[gKey];
    const gridEl = document.getElementById('cal-grid-' + gKey);
    if (!gridEl) return;

    gridEl.innerHTML = '';

    const firstDow = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
    const days     = new Date(calYear, calMonth + 1, 0).getDate();
    const todayKey = dateKey(today);

    for (let i = 0; i < firstDow; i++) {
      const b = document.createElement('div');
      b.className = 'cal-blank';
      gridEl.appendChild(b);
    }

    for (let d = 1; d <= days; d++) {
      const dt       = new Date(calYear, calMonth, d);
      const key      = dateKey(dt);
      const isToday  = key === todayKey;
      const isFuture = dt > today;

      const states     = group.habits.map(hk => habitData[hk].has(key));
      const colorPairs = group.habits.map(hk => ({
        done:  HABIT_CONFIG[hk].done,
        empty: HABIT_CONFIG[hk].empty,
      }));

      const cell = document.createElement('div');
      cell.className = 'month-day' +
        (isToday  ? ' today'  : '') +
        (isFuture ? ' future' : '');
      cell.innerHTML = `<span class="day-num">${d}</span>` + pieSvg(states, colorPairs);
      gridEl.appendChild(cell);
    }

    // 更新圖例的本月累積天數
    group.habits.forEach(hk => {
      const el = document.getElementById('lcount-' + hk);
      if (el) el.textContent = getMonthCount(hk) + ' 日';
    });
  });
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCalendar();
}
